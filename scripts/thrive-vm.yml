# LinuxKit VM image for Thrive Desktop — matches Docker Desktop's approach
kernel:
  image: linuxkit/kernel:6.6.71-77b4563829536629b7d5768d4407453c26602d65
  cmdline: "console=hvc0 root=/dev/vda rw quiet"

init:
  - linuxkit/init:v1.3.0
  - linuxkit/runc:v1.3.0
  - linuxkit/containerd:v1.3.0

onboot:
  - name: sysctl
    image: linuxkit/sysctl:v1.3.0

services:
  - name: thrived
    image: thrive-daemon:local
    capabilities:
      - CAP_SYS_ADMIN
      - CAP_NET_ADMIN
    mounts:
      - type: bind
        source: /var/run
        destination: /var/run
        options: ["rw", "rbind", "rshared"]
    env:
      - THRIVE_VSOCK_PORT=1024

  - name: getty
    image: linuxkit/getty:v1.3.0
    env:
      - INSECURE=true
